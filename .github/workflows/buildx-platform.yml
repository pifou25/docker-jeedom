name: Docker Multiplatform Build ci

on:
  push:
    branches:
      - 'workflow'

# no workflow concurrency, cancel previous running workflow
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
      
jobs:
  docker:
    runs-on: ubuntu-latest
    steps:
      -
        name: Checkout
        uses: actions/checkout@v4.1.2
      - name: Cache Docker layers
        # https://github.com/marketplace/actions/cache
        # this action allows caching dependancies and build output
        uses: actions/cache@v4
        id: cache
        with:
          path: /tmp/.buildx-cache
          key: ${{ runner.os }}-buildx-${{ github.ref_name }}
          restore-keys: |
            ${{ runner.os }}-buildx-
      -
        name: Composer install Jeedom source
        # https://github.com/marketplace/actions/build-and-push-docker-images
        uses: docker/build-push-action@v5
        continue-on-error: true
        with:
          context: build/Dockerfile.source
          push: true
          cache-from: type=local,src=/tmp/.buildx-cache
          cache-to: type=local,dest=/tmp/.buildx-cache
          tags: | 
            ${{ secrets.DOCKER_USER }}/jeedom:source


  matrix_jobs:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        debian: ["buster", "bullseye", "bookworm"]
        php: [7.3, 8.1]
        jeedom: ["V4-stable", "beta"]
        target: ["light", "full"]
        xdebug: [true; false]
        exclude:
          - debian: "bookworm"
            php: 7.3
    steps:
      - name: "${{ matrix.debian }} PHP${{ matrix.php }} target ${{ matrix.target }} branch ${{ matrix.jeedom }} debug ${{ matrix.xdebug }}"
        id: buildJeedom
        continue-on-error: true
        run: |
          echo "${{ matrix.debian }} PHP${{ matrix.php }} target ${{ matrix.target }} branch ${{ matrix.jeedom }} debug ${{ matrix.xdebug }} has ERRORS!"
          echo docker ps
      - name: Check on failures
        if: steps.buildJeedom.outcome != 'success'
        run: echo "${{ matrix.debian }} PHP${{ matrix.php }} target ${{ matrix.target }} branch ${{ matrix.jeedom }} debug ${{ matrix.xdebug }} has ERRORS!"
        